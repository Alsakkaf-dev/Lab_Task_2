<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Notes Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>✏️ Quick Notes Dashboard</h1>
        <p>Practice <strong>DOM manipulation</strong> + <strong>BOM</strong>.</p>
        <div class="badge">💻 Lab: BOM + DOM | pure JS</div>
    </header>

    <div class="grid">
        <!-- Part 2: Left Panel (Form) -->
        <div class="card" id="left-panel">
            <h2>✏️ Add a note</h2>
            <div class="form-group">
                <label>Title *</label>
                <input type="text" id="noteTitle" placeholder="e.g., DOM practice">
            </div>
            <div class="form-group">
                <label>Content</label>
                <textarea id="noteContent" rows="2" placeholder="Write something..."></textarea>
            </div>
            <button id="addNoteBtn">+ Add Note</button>
            <div class="counter" id="noteCounter">0 notes</div>
        </div>

        <!-- Part 3: Right Panel (List & BOM) -->
        <div class="card" id="right-panel">
            <h2>🗒️ Your notes</h2>
            <div id="notesContainer" class="notes-list">
                <!-- Rendered dynamically -->
            </div>
            
            <hr>
            
            <h2 style="font-size:1rem;">🌐 Browser info (BOM)</h2>
            <div class="info-panel" id="bomPanel">
                <div class="info-row">
                    <span>🖥️ Window size:</span>
                    <span id="windowSize">-- x --</span>
                </div>
                <div class="info-row">
                    <span>🆔 User Agent:</span>
                    <span id="userAgent">--</span>
                </div>
            </div>

            <button id="clearAllBtn" style="background:#64748b; margin-top:0.8rem;">
                🗑️ Clear all notes
            </button>
        </div>
    </div>

    <footer>
        BOM: confirm() on delete · alert() on empty title · resize event updates window size.
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
