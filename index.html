<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Notes Dashboard</title>
  </head>

  <body>

    <div>
      <header>
        <h1>✏️ Quick Notes Dashboard</h1>
        <p>Practice <strong>DOM manipulation</strong> + <strong>BOM</strong>.</p>
        <div>💻 Lab: BOM + DOM | pure JS</div>
    </header>

    <div>
      <div>
            <h2>✏️ Add a note</h2>
            <div>
                <label>Title *</label>
                <input type="text" placeholder="e.g., DOM practice">
            </div>
            <div>
                <label>Content</label>
                <textarea rows="2" placeholder="Write something..."></textarea>
            </div>
            <button>+ Add Note</button>
            <div>0 notes</div>
    </div>








    </div>
    <footer>
        BOM: confirm() on delete · alert() on empty title · resize event updates window size.
    </footer>


  </body>
</html>
