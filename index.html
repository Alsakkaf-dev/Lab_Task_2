<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Notes Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div>
    <header>
        <h1 class="container">✏️ Quick Notes Dashboard</h1>
        <p>Practice <strong>DOM manipulation</strong> + <strong>BOM</strong>.</p>
        <div class="badge">💻 Lab: BOM + DOM | pure JS</div>
    </header>

    <div  class="grid">
        <!-- Part 2: Left Panel (Form) -->
        <div class="card" id="left-panel">
            <h2>✏️ Add a note</h2>
            <div class="form-group">
                <label  for="noteTitle">Title *</label>
                <input type="text" placeholder="e.g., DOM practice">
            </div>
            <div  class="form-group">
                <label for="noteContent">Content</label>
                <textarea id="noteContent" rows="2" placeholder="Write something..."></textarea>
            </div>
            <button>+ Add Note</button>
            <div>0 notes</div>
        </div>

        <!-- Part 3: Right Panel (List & BOM) -->
        <div  id="addNoteBtn">
            <h2>🗒️ Your notes</h2>
            <div>
                <!-- Rendered dynamically -->
            </div>
            
            <hr>
            
            <h2>🌐 Browser info (BOM)</h2>
            <div>
                <div>
                    <span>🖥️ Window size:</span>
                    <span>-- x --</span>
                </div>
                <div>
                    <span>🆔 User Agent:</span>
                    <span>--</span>
                </div>
            </div>

            <button>
                🗑️ Clear all notes
            </button>
        </div>
    </div>

    <footer>
        BOM: confirm() on delete · alert() on empty title · resize event updates window size.
    </footer>
</div>

</body>
</html>
