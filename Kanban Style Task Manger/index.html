<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Task Board</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

</head>
<body>

    <header>
        <!-- This box shows how many tasks are currently active -->
    <div class="header-left">
        <h1 style="font-size: 2.5rem; letter-spacing: -1.5px;">Dashboard</h1>
        <div id="totalBadge" class="badge" style="background: linear-gradient(to right, #6366f1, #a855f7);">
            🚀 0 active tasks
        </div>
    </div>
        <!-- This dropdown lets you filter tasks by their priority -->
    <div class="header-right">
        <div class="filter-controls">
            <span style="font-size: 0.7rem; font-weight: 800; color: #94a3b8; display: block;">SORT BY</span>
            <select id="priorityFilter" style="background: white; border-radius: 8px; padding: 10px 15px; border: 1px solid #ddd;">
                <option value="all">Show All Tasks</option>
                <option value="high">🔴 High Priority</option>
                <option value="medium">🟡 Medium</option>
                <option value="low">🟢 Low</option>
            </select>
        </div>
    </div>
</header>

<main class="board">
    <!-- TO DO COLUMN -->
    <section class="column" id="todo">
        <div class="column-header">
            <h2>To Do</h2>
            
            <!-- This is the empty space where task cards will appear -->
                <button class="add-task-btn" data-column="todo">Add Task</button>
            </div>
            <ul class="task-list"></ul>
        </section>

        <!-- IN PROGRESS COLUMN -->
        <section class="column" id="inprogress">
            <div class="column-header">
                <h2>In Progress</h2>
                <button class="add-task-btn" data-column="inprogress">Add Task</button>
            </div>
            <ul class="task-list"></ul>
        </section>

        <!-- DONE COLUMN -->
        <section class="column" id="done">
            <div class="column-header">
                <h2>Done</h2>
                <button id="clearDoneBtn">Clear Done</button>
            </div>
            <ul class="task-list"></ul>
        </section>
    </main>

    <!-- MODAL POPUP -->
    <div id="taskModal" class="modal is-hidden">
        <div class="modal-content">
            <h2 id="modalTitle">Add New Task</h2>
            <input type="hidden" id="modalTaskId">
            <input type="hidden" id="modalColumnId">
            
            <label>Title *</label>
            <input type="text" id="taskTitle" placeholder="Task summary">
            
            <label>Description</label>
            <textarea id="taskDesc" placeholder="Detailed info..."></textarea>
            
            <label>Priority</label>
            <select id="taskPriority">
                <option value="low">🟢 Low Priority</option>
                <option value="medium">🟡 Medium Priority</option>
                <option value="high">🔴 High Priority</option>
            </select>
            
            <label>Due Date</label>
            <input type="date" id="taskDueDate">
            
            <div class="modal-actions">
                <button id="saveTaskBtn">Save Task</button>
                <button id="closeModalBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="taskmanager.js"></script>
</body>
</html>
