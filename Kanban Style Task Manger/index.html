<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Task Board</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

</head>
<body>

    <header>
        <div class="header-content">
            <h1>Kanban Board</h1>
            <div id="totalBadge" class="badge">0 Tasks</div>
        </div>
        <div class="filter-controls">
            <label>Filter Priority:</label>
            <select id="priorityFilter">
                <option value="all">All</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
            </select>
        </div>
    </header>

    <main class="board">
        <!-- TO DO COLUMN -->
        <section class="column" id="todo">
            <div class="column-header">
                <h2>To Do</h2>
                <button class="add-task-btn" data-column="todo">+ Add Task</button>
            </div>
            <ul class="task-list"></ul>
        </section>

        <!-- IN PROGRESS COLUMN -->
        <section class="column" id="inprogress">
            <div class="column-header">
                <h2>In Progress</h2>
                <button class="add-task-btn" data-column="inprogress">+ Add Task</button>
            </div>
            <ul class="task-list"></ul>
        </section>

        <!-- DONE COLUMN -->
        <section class="column" id="done">
            <div class="column-header">
                <h2>Done</h2>
                <button id="clearDoneBtn">Clear Done</button>
            </div>
            <ul class="task-list"></ul>
        </section>
    </main>

    <!-- MODAL POPUP -->
    <div id="taskModal" class="modal is-hidden">
        <div class="modal-content">
            <h2 id="modalTitle">Add New Task</h2>
            <input type="hidden" id="modalTaskId">
            <input type="hidden" id="modalColumnId">
            
            <label>Title *</label>
            <input type="text" id="taskTitle" placeholder="Task summary">
            
            <label>Description</label>
            <textarea id="taskDesc" placeholder="Detailed info..."></textarea>
            
            <label>Priority</label>
            <select id="taskPriority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
            </select>
            
            <label>Due Date</label>
            <input type="date" id="taskDueDate">
            
            <div class="modal-actions">
                <button id="saveTaskBtn">Save Task</button>
                <button id="closeModalBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="taskmanager.js"></script>
</body>
</html>
