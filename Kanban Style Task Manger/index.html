<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Task Board</title>
    <link rel="stylesheet" href="style.css">
</head>

  <body>
    <header>
        <div><!-- adding styling later-->
            <h1>Kanban Board</h1>
            <div id="totalBadge" class="badge">0 Tasks</div>
        </div>
        <div> <!-- adding styling later-->
            <label>Filter Priority:</label>
            <select id="priorityFilter">
                <option value="all">All</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
            </select>
        </div>
    </header>

      <main><!-- adding styling later-->
        <section><!-- adding styling later-->
            <div><!-- adding styling later-->
                <h2>To Do</h2>
                <button>+ Add Task</button><!-- adding styling later-->
            </div>
            <ul></ul><!-- adding styling later-->
        </section>

        

        


  </body>
</html>
